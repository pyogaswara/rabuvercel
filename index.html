<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page & Gemini Search</title>
  <!-- Import Google Fonts: Outfit (headings) & Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #0b0813;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f1f6;
      --text-muted: #a19bb0;
      
      /* Accent Colors */
      --primary: #9d4edd;
      --primary-hover: #b5179e;
      --google-start: #4285f4;
      --google-end: #34a853;
      --bing-start: #008373;
      --bing-end: #ffb900;
      --yahoo-start: #720e9e;
      --yahoo-end: #ff0052;
      
      /* Shadows */
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.25);
      --shadow-glow: 0 0 25px rgba(157, 78, 221, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(157, 78, 221, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 90% 80%, rgba(253, 216, 53, 0.05) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(72, 14, 158, 0.08) 0%, transparent 60%);
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      padding: 20px;
      overflow-y: auto;
    }

    /* Container holding the app */
    .container {
      width: 100%;
      max-width: 760px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    
    .container:hover {
      border-color: rgba(157, 78, 221, 0.2);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(157, 78, 221, 0.05);
    }

    /* Header styling */
    header {
      margin-bottom: 35px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, #d8b4fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    /* Button Group styling */
    .button-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 35px;
    }

    .search-btn {
      padding: 14px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .search-btn:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .search-btn:active {
      transform: translateY(-1px);
    }

    .btn-google {
      background: linear-gradient(135deg, var(--google-start) 0%, #1a73e8 100%);
    }
    .btn-google:hover {
      box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3);
    }

    .btn-bing {
      background: linear-gradient(135deg, var(--bing-start) 0%, #006b5d 100%);
    }
    .btn-bing:hover {
      box-shadow: 0 8px 20px rgba(0, 131, 115, 0.3);
    }

    .btn-yahoo {
      background: linear-gradient(135deg, var(--yahoo-start) 0%, #500075 100%);
    }
    .btn-yahoo:hover {
      box-shadow: 0 8px 20px rgba(114, 14, 158, 0.3);
    }

    /* Section divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 30px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .divider:not(:empty)::before {
      margin-right: 15px;
    }

    .divider:not(:empty)::after {
      margin-left: 15px;
    }

    /* Search Box Section */
    .search-box-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .search-form {
      display: flex;
      position: relative;
      align-items: center;
    }

    .search-input-icon {
      position: absolute;
      left: 18px;
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .search-input-icon svg {
      width: 20px;
      height: 20px;
    }

    .search-query-input {
      width: 100%;
      padding: 16px 120px 16px 52px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-query-input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: var(--shadow-glow);
    }

    .search-query-input::placeholder {
      color: var(--text-muted);
    }

    /* Prompt submit button */
    .submit-prompt-btn {
      position: absolute;
      right: 8px;
      top: 8px;
      bottom: 8px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .submit-prompt-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 0 10px rgba(157, 78, 221, 0.3);
    }

    .submit-prompt-btn:disabled {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .submit-prompt-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Warning message about missing API key config */
    .key-warning {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 185, 0, 0.1);
      border: 1px solid rgba(255, 185, 0, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #ffb900;
      margin-top: 10px;
    }

    .key-warning svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Result Panel */
    .result-container {
      margin-top: 25px;
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: fadeIn 0.4s ease forwards;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-title svg {
      width: 14px;
      height: 14px;
      color: var(--primary);
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      font-size: 0.98rem;
      line-height: 1.6;
      color: #e5e1ec;
      max-height: 380px;
      overflow-y: auto;
    }

    /* Custom Scrollbar for response panel and index page */
    .result-card::-webkit-scrollbar, body::-webkit-scrollbar {
      width: 6px;
    }

    .result-card::-webkit-scrollbar-track, body::-webkit-scrollbar-track {
      background: transparent;
    }

    .result-card::-webkit-scrollbar-thumb, body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .result-card::-webkit-scrollbar-thumb:hover, body::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Simple Markdown Styling for AI responses */
    .result-card p {
      margin-bottom: 12px;
    }

    .result-card p:last-child {
      margin-bottom: 0;
    }

    .result-card strong {
      color: #fff;
      font-weight: 600;
    }

    .result-card ul, .result-card ol {
      margin-bottom: 12px;
      padding-left: 20px;
    }

    .result-card li {
      margin-bottom: 4px;
    }

    .result-card code {
      background: rgba(255, 255, 255, 0.08);
      font-family: 'Courier New', Courier, monospace;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: #f72585;
    }

    .result-card pre {
      background: #08050e;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .result-card pre code {
      background: none;
      padding: 0;
      color: #fff;
      font-size: 0.85rem;
    }

    .result-card h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      margin: 18px 0 8px 0;
      color: #fff;
    }

    /* Skeleton Loading State */
    .skeleton-loader {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 25px;
    }

    .skeleton-line {
      height: 16px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.03) 75%);
      background-size: 200% 100%;
      border-radius: 4px;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-line.line-1 { width: 40%; height: 12px; margin-bottom: 8px; }
    .skeleton-line.line-2 { width: 90%; }
    .skeleton-line.line-3 { width: 85%; }
    .skeleton-line.line-4 { width: 95%; }
    .skeleton-line.line-5 { width: 60%; }

    /* Keyframes */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Media Queries */
    @media(max-width: 640px) {
      .container {
        padding: 24px;
      }
      
      h1 {
        font-size: 1.5rem;
      }

      .button-group {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .search-query-input {
        padding-right: 52px;
      }

      .submit-prompt-btn span {
        display: none; /* Hide text, only show SVG on tiny screens */
      }

      .submit-prompt-btn {
        padding: 0 14px;
        right: 6px;
        top: 6px;
        bottom: 6px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header>
      <h1>Cari dengan Mesin Telusur</h1>
    </header>

    <!-- Navigation Buttons -->
    <div class="button-group">
      <a href="https://www.google.com" target="_blank" class="search-btn btn-google">
        <svg viewBox="0 0 24 24"><path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-6.887 4.114-4.833 0-8.75-3.87-8.75-8.514s3.917-8.514 8.75-8.514c2.195 0 4.103.804 5.592 2.378l3.29-3.29C18.995 1.15 15.827 0 12.24 0 5.466 0 0 5.373 0 12s5.466 12 12.24 12c6.906 0 12.24-4.78 12.24-12 0-.785-.067-1.396-.188-1.714H12.24z"/></svg>
        Google
      </a>
      <a href="https://www.bing.com" target="_blank" class="search-btn btn-bing">
        <svg viewBox="0 0 24 24"><path d="M5 2c-1.654 0-3 1.346-3 3v14c0 1.654 1.346 3 3 3h14c1.654 0 3-1.346 3-3V5c0-1.654-1.346-3-3-3H5zm6.818 3.864l5.96 2.316-7.854 7.828V5.864zm-1.85.92l-2.04.79v9.704l3.89 2.254V11.236l-1.85-4.452z"/></svg>
        Bing
      </a>
      <a href="https://search.yahoo.com" target="_blank" class="search-btn btn-yahoo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm3.29 14.29L12 13l-3.29 3.29c-.39.39-1.02.39-1.41 0-.39-.39-.39-1.02 0-1.41L10.59 11.6 7.3 8.3c-.39-.39-.39-1.02 0-1.41s1.02-.39 1.41 0L12 10.18l3.29-3.29c.39-.39 1.02-.39 1.41 0s.39 1.02 0 1.41L13.41 11.6l3.29 3.29c.39.39.39 1.02 0 1.41-.39.39-1.03.39-1.41 0z"/></svg>
        Yahoo
      </a>
    </div>

    <!-- Divider -->
    <div class="divider">Atau Tanya Gemini AI</div>

    <!-- Search Section -->
    <div class="search-box-container">
      <form class="search-form" id="geminiSearchForm">
        <div class="search-input-icon">
          <!-- Sparkles/AI Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"></path>
          </svg>
        </div>
        <input type="text" class="search-query-input" id="searchQueryInput" placeholder="Tanyakan apa saja ke Gemini AI..." required>
        <button type="submit" class="submit-prompt-btn" id="submitBtn">
          <span>Kirim</span>
          <!-- Paper Plane Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>

      <!-- Key Missing Warning Alert -->
      <div class="key-warning" id="keyWarning" style="display: none;">
        <!-- Alert Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <div id="keyWarningMessage">Memuat konfigurasi Gemini API...</div>
      </div>
    </div>

    <!-- Shimmering Skeleton Loader -->
    <div class="skeleton-loader" id="skeletonLoader">
      <div class="skeleton-line line-1"></div>
      <div class="skeleton-line line-2"></div>
      <div class="skeleton-line line-3"></div>
      <div class="skeleton-line line-4"></div>
      <div class="skeleton-line line-5"></div>
    </div>

    <!-- AI Response Display Area -->
    <div class="result-container" id="resultContainer">
      <div class="result-header">
        <div class="result-title">
          <!-- Sparkle/Stars Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
          </svg>
          Respons Gemini AI
        </div>
        <button class="copy-btn" id="copyBtn" title="Salin ke papan klip">
          <!-- Copy Clipboard Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="copyBtnIcon">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span id="copyBtnText">Salin</span>
        </button>
      </div>
      <div class="result-card" id="resultCard">
        <!-- Rendered response goes here -->
      </div>
    </div>
  </div>

  <script>
    // DOM Elements
    const geminiSearchForm = document.getElementById('geminiSearchForm');
    const searchQueryInput = document.getElementById('searchQueryInput');
    const submitBtn = document.getElementById('submitBtn');
    const keyWarning = document.getElementById('keyWarning');
    const keyWarningMessage = document.getElementById('keyWarningMessage');
    
    const skeletonLoader = document.getElementById('skeletonLoader');
    const resultContainer = document.getElementById('resultContainer');
    const resultCard = document.getElementById('resultCard');
    const copyBtn = document.getElementById('copyBtn');
    const copyBtnText = document.getElementById('copyBtnText');
    const copyBtnIcon = document.getElementById('copyBtnIcon');

    // Simple markdown parsing helper
    function parseMarkdown(text) {
      if (!text) return '';
      
      let html = text
        // Escape standard HTML tags to avoid XSS
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Code blocks ```code```
      html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
        return `<pre><code>${code.trim()}</code></pre>`;
      });

      // Inline code `code`
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold **text**
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

      // Italic *text*
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

      // Headings ### Heading
      html = html.replace(/^\s*###\s+(.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^\s*##\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^\s*#\s+(.+)$/gm, '<h1>$1</h1>');

      // Unordered lists - List Item
      html = html.replace(/^\s*-\s+(.+)$/gm, '<li>$1</li>');
      // Wrap list items in <ul>. Simple regex wrap
      html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

      // Paragraph blocks (excluding tags we just formatted)
      const lines = html.split('\n');
      const formattedLines = lines.map(line => {
        const trimmed = line.trim();
        if (!trimmed) return '';
        // If it starts/ends with custom container blocks, leave it
        if (trimmed.startsWith('<pre>') || trimmed.endsWith('</pre>') ||
            trimmed.startsWith('<h3>') || trimmed.startsWith('<h2>') ||
            trimmed.startsWith('<h1>') || trimmed.startsWith('<ul>') ||
            trimmed.startsWith('<li>') || trimmed.startsWith('</ul>')) {
          return line;
        }
        return `<p>${line}</p>`;
      });

      return formattedLines.join('\n');
    }

    // Call Vercel Serverless Function to query Gemini AI
    geminiSearchForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const query = searchQueryInput.value.trim();
      if (!query) return;

      // UI State: Reset previous content, show loaders, disable search
      resultContainer.style.display = 'none';
      resultCard.innerHTML = '';
      skeletonLoader.style.display = 'flex';
      submitBtn.disabled = true;
      searchQueryInput.disabled = true;

      // Scroll smoothly to loader
      skeletonLoader.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ query: query })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          const errMsg = data.error || `Error ${response.status}: ${response.statusText}`;
          throw new Error(errMsg);
        }
        
        // Parse candidate response from proxy response
        const candidate = data.candidates?.[0];
        const partText = candidate?.content?.parts?.[0]?.text;
        
        if (!partText) {
          throw new Error('Gemini AI tidak mengembalikan respons teks valid.');
        }

        // Render response
        resultCard.innerHTML = parseMarkdown(partText);
        
        // Hide loader, show result
        skeletonLoader.style.display = 'none';
        resultContainer.style.display = 'flex';
        
        // Scroll to result card
        resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      } catch (err) {
        console.error(err);
        
        let customErrorHTML = '';
        if (err.message.includes('tidak dikonfigurasi') || err.message.includes('not configured')) {
          customErrorHTML = `
            <p style="color: #ff3366; font-weight: 600;">Environment Variable Belum Diatur</p>
            <p>Web Master belum mengonfigurasi variable <code>GEMINI_API_KEY</code> di server environment atau file .env lokal.</p>
          `;
        } else if (err.message.includes('API_KEY_INVALID') || err.message.includes('API key not valid')) {
          customErrorHTML = `
            <p style="color: #ff3366; font-weight: 600;">API Key Tidak Valid</p>
            <p>Kunci API Gemini yang dikonfigurasi oleh Web Master di environment variable tidak valid.</p>
          `;
        } else {
          customErrorHTML = `
            <p style="color: #ff3366; font-weight: 600;">Gagal mendapatkan respons</p>
            <p>${err.message}</p>
          `;
        }
        
        resultCard.innerHTML = customErrorHTML;
        skeletonLoader.style.display = 'none';
        resultContainer.style.display = 'flex';
      } finally {
        submitBtn.disabled = false;
        searchQueryInput.disabled = false;
      }
    });

    // Copy result content to clipboard
    copyBtn.addEventListener('click', () => {
      // Get plain text of response card
      const textToCopy = resultCard.innerText;
      
      navigator.clipboard.writeText(textToCopy).then(() => {
        // Change text state
        copyBtnText.textContent = 'Tersalin!';
        copyBtn.style.borderColor = '#2ec4b6';
        copyBtn.style.color = '#2ec4b6';
        
        // Success animation icon (Checkmark)
        copyBtnIcon.innerHTML = `
          <polyline points="20 6 9 17 4 12"></polyline>
        `;

        setTimeout(() => {
          copyBtnText.textContent = 'Salin';
          copyBtn.style.borderColor = '';
          copyBtn.style.color = '';
          
          // Revert back to Clipboard icon
          copyBtnIcon.innerHTML = `
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          `;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy text: ', err);
      });
    });
  </script>
</body>
</html>
