<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page Search Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 50%, #4facfe 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .button-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .search-btn {
      padding: 15px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .search-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: 0.5s;
    }

    .search-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .search-btn:hover::before {
      left: 100%;
    }

    .search-btn:active {
      transform: translateY(-2px);
    }

    .btn-google {
      background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
    }

    .btn-bing {
      background: linear-gradient(135deg, #008373 0%, #ffb900 100%);
    }

    .btn-yahoo {
      background: linear-gradient(135deg, #720e9e 0%, #ff0052 100%);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Cari dengan Mesin Telusur Favorit Anda</h1>
    <div class="button-group">
      <a href="https://www.google.com" target="_blank" class="search-btn btn-google">Google</a>
      <a href="https://www.bing.com" target="_blank" class="search-btn btn-bing">Bing</a>
      <a href="https://search.yahoo.com" target="_blank" class="search-btn btn-yahoo">Yahoo</a>
    </div>
  </div>
</body>
</html>
